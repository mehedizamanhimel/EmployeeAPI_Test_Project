name: Employee API Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    name: Run TestNG REST Assured Tests
    runs-on: ubuntu-latest

    # dorny/test-reporter requires checks:write to post inline results
    permissions:
      checks: write
      contents: read

    steps:

      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Java 11 ─────────────────────────────────────────────────────────
      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: maven

      # ── 3. Run tests ───────────────────────────────────────────────────────
      - name: Run TestNG tests via Maven
        run: mvn clean test -B

      # ── 4. Publish Surefire XML results ────────────────────────────────────
      # Pinned to v1.9.1 — floating v1 tag has TypeError bug with TestNG XML
      - name: Publish Test Results
        uses: dorny/test-reporter@v1.9.1
        if: always()
        with:
          name: TestNG Results
          path: "target/surefire-reports/TEST-*.xml"
          reporter: java-junit
          fail-on-error: false

      # ── 5. Upload Surefire Reports ─────────────────────────────────────────
      - name: Upload Surefire Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: surefire-reports
          path: target/surefire-reports/
          retention-days: 14
